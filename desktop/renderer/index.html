<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'">
  <title>FocusLens</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d0d0d;
      color: #e0e0e0;
      width: 400px;
      min-height: 600px;
      overflow-x: hidden;
      user-select: none;
    }

    /* ── Drag region ── */
    #titlebar {
      -webkit-app-region: drag;
      height: 36px;
      background: #111;
      display: flex;
      align-items: center;
      padding: 0 16px;
      justify-content: space-between;
      border-bottom: 1px solid #1e1e1e;
    }
    #titlebar span { font-size: 13px; font-weight: 600; color: #aaa; }
    #close-btn {
      -webkit-app-region: no-drag;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: #e05b5b;
      border: none; cursor: pointer;
    }

    /* ── Status pill ── */
    #status-pill {
      margin: 14px 16px 0;
      padding: 10px 14px;
      border-radius: 10px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    #status-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: #555;
      flex-shrink: 0;
      transition: background 0.4s;
    }
    #status-label { font-size: 13px; font-weight: 600; text-transform: capitalize; }
    #status-conf  { font-size: 11px; color: #555; margin-left: auto; }

    /* ── Stats grid ── */
    #stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 12px 16px 0;
    }
    .stat-card {
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 10px;
      padding: 12px 14px;
    }
    .stat-card .label { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-card .value { font-size: 20px; font-weight: 700; color: #e0e0e0; margin-top: 4px; }
    .stat-card .unit  { font-size: 10px; color: #555; }

    /* ── Event feed ── */
    #event-feed-wrap {
      margin: 12px 16px 0;
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 10px;
      padding: 10px 14px;
      height: 160px;
      overflow-y: auto;
    }
    #event-feed-wrap .feed-title { font-size: 10px; color: #555; text-transform: uppercase; margin-bottom: 8px; }
    .feed-item {
      font-size: 11px;
      color: #666;
      padding: 3px 0;
      border-bottom: 1px solid #1a1a1a;
      display: flex;
      gap: 8px;
    }
    .feed-item .ft { color: #444; flex-shrink: 0; }
    .feed-item .ftype { color: #5B47E0; }

    /* ── Label button ── */
    #label-btn {
      display: block;
      margin: 12px 16px 0;
      width: calc(100% - 32px);
      padding: 11px;
      background: #5B47E0;
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    #label-btn:hover { background: #4a38c4; }

    /* ── Label modal ── */
    #label-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    #label-modal.open { display: flex; }
    #modal-box {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 14px;
      padding: 22px;
      width: 340px;
    }
    #modal-box h3 { font-size: 14px; margin-bottom: 14px; }
    .lbtn {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 9px 12px;
      background: #111;
      border: 1px solid #333;
      border-radius: 9px;
      color: #ddd;
      font-size: 12px;
      cursor: pointer;
      margin-bottom: 7px;
      transition: border-color 0.15s;
    }
    .lbtn:hover, .lbtn.selected { border-color: #5B47E0; background: #1e1a3a; }
    .lbtn .emoji { font-size: 18px; }
    #modal-actions { display: flex; gap: 10px; margin-top: 12px; }
    #modal-cancel {
      flex: 1; padding: 9px; background: #222; border: 1px solid #333;
      border-radius: 8px; color: #888; cursor: pointer; font-size: 12px;
    }
    #modal-submit {
      flex: 1; padding: 9px; background: #5B47E0; border: none;
      border-radius: 8px; color: #fff; cursor: pointer; font-size: 12px; font-weight: 600;
    }
    #modal-submit:disabled { background: #333; cursor: default; }

    /* ── WS badge ── */
    #ws-badge {
      margin: 10px 16px;
      font-size: 10px;
      color: #444;
      display: flex;
      gap: 6px;
      align-items: center;
    }
    #ws-dot { width: 6px; height: 6px; border-radius: 50%; background: #e05b5b; }
    #ws-dot.connected { background: #4ade80; }
  </style>
</head>
<body>

<!-- Title bar -->
<div id="titlebar">
  <span>🔬 FocusLens</span>
  <button id="close-btn" onclick="window.focusLens.endSession(); window.close()"></button>
</div>

<!-- Cognitive state pill -->
<div id="status-pill">
  <div id="status-dot"></div>
  <span id="status-label">Connecting...</span>
  <span id="status-conf"></span>
</div>

<!-- Stats grid -->
<div id="stats-grid">
  <div class="stat-card">
    <div class="label">Focus streak</div>
    <div class="value" id="stat-streak">—</div>
    <div class="unit">minutes</div>
  </div>
  <div class="stat-card">
    <div class="label">Switches / min</div>
    <div class="value" id="stat-switches">—</div>
    <div class="unit">app switches</div>
  </div>
  <div class="stat-card">
    <div class="label">Typing speed</div>
    <div class="value" id="stat-wpm">—</div>
    <div class="unit">WPM</div>
  </div>
  <div class="stat-card">
    <div class="label">Active app</div>
    <div class="value" id="stat-app" style="font-size:13px; margin-top:6px">—</div>
    <div class="unit">&nbsp;</div>
  </div>
</div>

<!-- Live event feed -->
<div id="event-feed-wrap">
  <div class="feed-title">Live event stream</div>
  <div id="event-feed"></div>
</div>

<!-- Label button -->
<button id="label-btn">Label my current state</button>

<!-- WS status -->
<div id="ws-badge">
  <div id="ws-dot"></div>
  <span id="ws-text">Disconnected</span>
</div>

<!-- Label modal -->
<div id="label-modal">
  <div id="modal-box">
    <h3>How focused are you right now?</h3>
    <button class="lbtn" data-label="focused">    <span class="emoji">🎯</span><div><b>Focused</b><br><span style="color:#666;font-size:10px">Deep in the zone</span></div></button>
    <button class="lbtn" data-label="distracted"> <span class="emoji">🌀</span><div><b>Distracted</b><br><span style="color:#666;font-size:10px">Mind wandering</span></div></button>
    <button class="lbtn" data-label="fatigued">   <span class="emoji">😴</span><div><b>Fatigued</b><br><span style="color:#666;font-size:10px">Low energy</span></div></button>
    <button class="lbtn" data-label="overloaded"> <span class="emoji">🤯</span><div><b>Overloaded</b><br><span style="color:#666;font-size:10px">Too much at once</span></div></button>
    <button class="lbtn" data-label="neutral">    <span class="emoji">😐</span><div><b>Neutral</b><br><span style="color:#666;font-size:10px">In between</span></div></button>
    <div id="modal-actions">
      <button id="modal-cancel">Cancel</button>
      <button id="modal-submit" disabled>Submit</button>
    </div>
  </div>
</div>

<script src="renderer.js"></script>
</body>
</html>
